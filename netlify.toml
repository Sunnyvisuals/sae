# Netlify — Vite + React (assets dans /dist, fichiers public/ copiés tel quel)
[build]
  command = "npm run build"
  publish = "dist"

# SPA : tout ce qui n’est pas un fichier statique → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
