# Netlify - Vite + React (alternative : Vercel + `vercel.json` avec les mêmes redirects / SPA).
#
# Déploiement : connecter ce dépôt Git dans le tableau Netlify (Build ci-dessous).
# Tout le site est publié : `index.html`, `404.html`, `parchemin-senac.html`, assets, etc.
#
# En CLI : `npx netlify login` puis `npx netlify init` (lier un site existant si
# la création auto renvoie Forbidden). Puis `npm run deploy:netlify`.
#
[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"

# Anciens signets `/act3` : redirection vers la racine SPA (l’app réécrit l’URL au chargement aussi).
[[redirects]]
  from = "/act3"
  to = "/"
  status = 302

[[redirects]]
  from = "/act3/"
  to = "/"
  status = 302

[build.environment]
  NODE_VERSION = "22"
